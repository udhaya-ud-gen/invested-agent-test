name: Deploy Backend API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (leave empty for auto timestamp)'
        required: false
        default: ''
      skip_cleanup:
        description: 'Skip old image cleanup?'
        required: false
        default: 'false'

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

env:
  PROJECT_ID: ligths-staging
  REGION: asia-south1
  SERVICE_NAME: web-portal-backend
  REPO_NAME: webportal-repo
  SERVICE_ACCOUNT_NAME: webportal-runner
  APP_PORT: 8080
  KEEP_IMAGES: 3

jobs:
  deploy:
    name: Build & Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.get_url.outputs.service_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=rev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          fi
          echo "IMAGE_PATH=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}" >> $GITHUB_ENV
          echo "SA_EMAIL=${{ env.SERVICE_ACCOUNT_NAME }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Pre-Deployment Checks
        run: |
          if [ ! -f "./server/Dockerfile" ]; then
            echo "[ERROR] No Dockerfile found in ./server/"
            exit 1
          fi
          if ! gcloud projects describe "${{ env.PROJECT_ID }}" &> /dev/null; then
            echo "[ERROR] Cannot access GCP project"
            exit 1
          fi
          echo "[OK] All checks passed"
          echo "  Service : ${{ env.SERVICE_NAME }}"
          echo "  Region  : ${{ env.REGION }}"

      - name: Build and Push Docker Image
        run: |
          FULL_IMAGE="${{ env.IMAGE_PATH }}:${{ env.IMAGE_TAG }}"
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          docker build -t "$FULL_IMAGE" ./server
          docker push "$FULL_IMAGE"
          echo "[OK] Built and pushed: $FULL_IMAGE"
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

      - name: Update Latest Tag
        run: |
          gcloud artifacts docker tags add \
            "${{ env.FULL_IMAGE }}" \
            "${{ env.IMAGE_PATH }}:latest" \
            --project "${{ env.PROJECT_ID }}"
          echo "[OK] Latest tag updated"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image="${{ env.FULL_IMAGE }}" \
            --platform=managed \
            --region="${{ env.REGION }}" \
            --service-account="${{ env.SA_EMAIL }}" \
            --port="${{ env.APP_PORT }}" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --concurrency=80 \
            --allow-unauthenticated \
            --set-secrets="MONGODBWEB_URI=MONGODBWEB_URI:latest,SECRET_KEY=SECRET_KEY:latest" \
            --tag="${{ env.IMAGE_TAG }}" \
            --project="${{ env.PROJECT_ID }}"
          echo "[OK] Deployed"

      - name: Health Check
        id: get_url
        run: |
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --platform=managed --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(status.url)")
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "-> URL: $SERVICE_URL"
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "  Attempt $i/$MAX_RETRIES..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $(gcloud auth print-identity-token)" \
              "${SERVICE_URL}/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then break; fi
            echo "  Got $HTTP_STATUS - retrying..."
            sleep $RETRY_DELAY
          done
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "[OK] Health check passed"
          else
            echo "[ERROR] Health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Clean Up Old Images
        if: github.event.inputs.skip_cleanup != 'true'
        run: |
          gcloud artifacts docker images list "${{ env.IMAGE_PATH }}" \
            --include-tags --sort-by="~CREATE_TIME" \
            --format="get(version)" --project="${{ env.PROJECT_ID }}" \
            | tail -n +$(( ${{ env.KEEP_IMAGES }} + 1 )) \
            | while read digest; do
                gcloud artifacts docker images delete \
                  "${{ env.IMAGE_PATH }}@${digest}" \
                  --delete-tags --quiet \
                  --project="${{ env.PROJECT_ID }}" || true
              done
          echo "[OK] Cleanup done"

      - name: Deployment Summary
        if: success()
        run: |
          echo "[OK] Backend deployed!"
          echo "  URL    : ${{ steps.get_url.outputs.service_url }}"
          echo "  Image  : ${{ env.FULL_IMAGE }}"
          echo "  By     : ${{ github.actor }}"
          echo "  Commit : ${{ github.sha }}"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "[FAILED] Rollback:"
          echo "  gcloud run services update-traffic ${{ env.SERVICE_NAME }} \\"
          echo "    --to-revisions=PREVIOUS_REVISION=100 \\"
          echo "    --region=${{ env.REGION }}"